# pre-commit 設定
# 有効化: uv run pre-commit install
# 手動実行: uv run pre-commit run --all-files

repos:
  # 汎用フック
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Ruff (Lint + Format)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.0
          - typer>=0.12
        args: [--config-file=mypy.ini]
        files: ^src/

  # bandit (セキュリティ)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: [-c, bandit.yaml, -r, src]
        pass_filenames: false

  # ローカルフック (uv run 経由)
  - repo: local
    hooks:
      - id: vulture
        name: vulture (dead code)
        entry: uv run vulture src .vulture_whitelist.py --min-confidence 80
        language: system
        pass_filenames: false
        types: [python]

      - id: radon
        name: radon (complexity CC>=C fails)
        entry: uv run radon cc src -a -nc
        language: system
        pass_filenames: false
        types: [python]

      - id: deptry
        name: deptry (dependency check)
        entry: uv run deptry src
        language: system
        pass_filenames: false
        types: [python]
